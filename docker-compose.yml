# Local development (published DB/MinIO ports for convenience).
# Production: use docker-compose.prod.yml and an external reverse proxy.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: banany
      POSTGRES_PASSWORD: banany
      POSTGRES_DB: banany
    ports:
      - "${BANANY_DB_PORT_HOST:-5432}:5432"
    volumes:
      - banany_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banany -d banany"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "${BANANY_MINIO_API_PORT_HOST:-9000}:9000"
      - "${BANANY_MINIO_CONSOLE_PORT_HOST:-9001}:9001"
    volumes:
      - banany_minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minio minio12345;
      mc mb local/banany --ignore-existing;
      exit 0;
      "

  app:
    build: .
    ports:
      - "${BANANY_APP_PORT_HOST:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://banany:banany@db:5432/banany
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio12345
      S3_BUCKET: banany
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  banany_pg:
  banany_minio:
